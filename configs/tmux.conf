# claude-termux: minimal, compact tmux config for Android/Termux.
# Not touching colors/theme — Termux's own theme wins.

# Prefix: Ctrl-a (easier one-handed than Ctrl-b on soft keyboards).
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Sane defaults.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g mouse on
set -g escape-time 10
set -s focus-events on

# Compact status bar — no decorations, no two-row widgets.
set -g status-interval 5
set -g status-left-length 20
set -g status-right-length 60
set -g status-left  ' #S '
set -g status-right ' %H:%M '

# Splits that match cwd.
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
unbind '"'
unbind %

# Reload config.
bind r source-file ~/.tmux.conf \; display-message 'tmux.conf reloaded'
